name: Build QGIS Plugin

on:
  push:
    tags:
      - "v*"
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -i '^version' WeirImporter/metadata.txt | cut -d'=' -f2 | tr -d ' ')
          echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare plugin ZIP
        run: |
          mkdir -p build
          cd WeirImporter
          zip -r ../build/WeirImporter_v${PLUGIN_VERSION}.zip . -x '*.pyc' '__pycache__/*'
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeirImporter
          path: build/WeirImporter_v${PLUGIN_VERSION}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: WeirImporter
          path: build

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/WeirImporter_v${{ env.PLUGIN_VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
