name: Build QGIS Plugin

on:
  push:
    tags:
      - "v*"
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      plugin_version: ${{ steps.version.outputs.PLUGIN_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -i '^version' Delft3DFileManager/metadata.txt | cut -d'=' -f2 | tr -d ' ')
          echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate tag matches metadata version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match metadata version ($PLUGIN_VERSION)."
            exit 1
          fi

      - name: Prepare plugin ZIP
        run: |
          mkdir -p build
          zip -r build/Delft3D_File_Manager_v${PLUGIN_VERSION}.zip Delft3DFileManager \
            -x '*.pyc' '*/__pycache__/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Delft3D_File_Manager
          path: build/Delft3D_File_Manager_v${{ env.PLUGIN_VERSION }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: Delft3D_File_Manager
          path: build

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Delft3D_File_Manager_v${{ needs.build.outputs.plugin_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
